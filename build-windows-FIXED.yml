name: Build Windows kiosk (Tauri)

# Тот же принцип, что уже используется для Irskom Audio Manager:
# сборка идёт не локально, а в GitHub Actions на чистой машине с
# актуальным Rust/Node — поэтому никаких проблем с версиями
# инструментов, как в песочнице, где собирался этот прототип, здесь
# не будет: раннер сам ставит свежий toolchain.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Установить Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Кэш Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установить Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Прогнать тесты движка синхронизации (kiosk_sync)
        run: cargo test --manifest-path src-tauri/kiosk_sync/Cargo.toml

      - name: Собрать инфокиоск (.exe/.msi/.nsis)
        run: tauri build
        working-directory: .

      - name: Переименовать установщик в безопасное имя
        # Имя программы содержит кириллицу ("Инфокиоск"), и NSIS
        # собирает файл вида "Инфокиоск_1.0.3_x64-setup.exe". При
        # публикации на GitHub такое имя иногда ломает прямую ссылку
        # на скачивание (кириллица в URL). Переименовываем в
        # предсказуемое имя из латиницы — ссылка на установщик всегда
        # будет одна и та же и всегда будет рабочей.
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Rename-Item -Path $installer.FullName -NewName "Infokiosk-Setup-x64.exe"

      - name: Собрать «Издателя» (kiosk_publish CLI)
        run: cargo build --release --manifest-path tools/kiosk-publisher-cli/Cargo.toml

      - name: Опубликовать артефакты сборки
        uses: actions/upload-artifact@v4
        with:
          name: infokiosk-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/infokiosk.exe
            tools/kiosk-publisher-cli/target/release/kiosk_publish.exe
          if-no-files-found: error

      - name: Опубликовать релиз со стабильной ссылкой на скачивание
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Инфокиоск — сборка №${{ github.run_number }}"
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            tools/kiosk-publisher-cli/target/release/kiosk_publish.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
