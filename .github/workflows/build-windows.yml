name: Build Windows kiosk (Tauri)

# Тот же принцип, что уже используется для Irskom Audio Manager:
# сборка идёт не локально, а в GitHub Actions на чистой машине с
# актуальным Rust/Node — поэтому никаких проблем с версиями
# инструментов, как в песочнице, где собирался этот прототип, здесь
# не будет: раннер сам ставит свежий toolchain.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Установить Rust
        # Точная версия компилятора берётся из файла rust-toolchain.toml
        # в корне проекта (закреплена там на 1.77.2 ради Windows 7/8/8.1
        # на ваших киосках) — этот шаг просто ставит инструмент, а какую
        # именно версию использовать, rustup решает по тому файлу сам.
        uses: dtolnay/rust-toolchain@stable

      - name: Кэш Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установить Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Прогнать тесты движка синхронизации (kiosk_sync)
        run: cargo test --manifest-path src-tauri/kiosk_sync/Cargo.toml

      - name: Скачать WebView2 для старых Windows (7/8/8.1)
        # Часть Windows, которая рисует интерфейс программы (WebView2),
        # Microsoft перестала обновлять для Windows 7/8/8.1 в январе
        # 2023-го. Последняя версия, которая там ещё работает, — 109.
        # Вшиваем её прямо в установщик, чтобы всё работало даже без
        # интернета на самом киоске и независимо от того, что уже
        # стоит на компьютере. (Архив последней рабочей версии — не от
        # Microsoft напрямую, а из проверенного открытого архива,
        # т.к. у самой Microsoft старые версии для скачивания уже
        # убраны со страницы.)
        shell: pwsh
        run: |
          $cabUrl = "https://github.com/westinyang/WebView2RuntimeArchive/releases/download/109.0.1518.78/Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.x64.cab"
          Invoke-WebRequest -Uri $cabUrl -OutFile "webview2-fixed.cab"
          # Внутри архива УЖЕ лежит папка с полным именем
          # Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.x64 —
          # поэтому распаковываем прямо в src-tauri, а не в папку с тем
          # же именем (иначе получается "папка в папке", установщик
          # кладёт её не туда, и программа на киоске не находит свой
          # встроенный браузер — именно это и случилось при первой
          # проверке на живом киоске).
          expand webview2-fixed.cab -F:* src-tauri
          $exe = "src-tauri/Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.x64/msedgewebview2.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "ОШИБКА: после распаковки не найден $exe — структура архива не та, что ожидалась. Содержимое src-tauri:"
            Get-ChildItem -Recurse -Depth 2 src-tauri | Select-Object FullName | Out-String | Write-Host
            exit 1
          }
          Write-Host "OK: встроенный браузер на месте — $exe"

      - name: Подобрать версии всех пакетов под старый Rust (системно)
        # ГЛАВНЫЙ шаг вместо ловли пакетов по одному. У современного
        # Cargo есть встроенный режим: при выборе версий каждого пакета
        # учитывать, какой минимальный Rust этот пакет требует, и не
        # брать те, что новее нашего (у нас в Cargo.toml заявлен
        # rust-version = "1.77"). Старый Cargo 1.77.2 такого режима ещё
        # не имеет, поэтому список версий составляет ВРЕМЕННО
        # установленный современный Cargo (в самой сборке он не
        # участвует), а собирает потом по этому списку старый.
        # Это разом закрывает ВСЮ категорию ошибок "package X cannot be
        # built because it requires rustc 1.85" — для всех пакетов
        # сразу, включая те, что ещё не всплывали.
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          cd src-tauri
          Remove-Item -Force Cargo.lock -ErrorAction SilentlyContinue
          $env:CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS = "fallback"
          cargo +stable generate-lockfile
          # Старый Cargo 1.77.2 понимает только формат №3 этого файла,
          # современный записывает №4 — разница только в номере,
          # содержимое для наших пакетов одинаковое.
          (Get-Content Cargo.lock -Raw) -replace 'version = 4', 'version = 3' | Set-Content Cargo.lock -NoNewline

      - name: Подстраховка — проверить и добить известных нарушителей
        # Прошлый шаг подбирает версии автоматически для всех пакетов,
        # у которых честно указано, какой Rust им нужен. Этот шаг —
        # страховка для уже пойманных нами вручную нарушителей: если
        # какой-то из них всё-таки проскочил новой версией, понижаем
        # его точечно и печатаем итоговую проверку OK / НЕ ТА ВЕРСИЯ.
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          cd src-tauri
          $desired = @{
            "toml_datetime"    = "0.7.5"
            "toml_edit"        = "0.20.2"
            "toml"             = "0.9.8"
            "toml_writer"      = "1.0.7"
            "toml_parser"      = "1.0.10"
            "serde_spanned"    = "1.0.4"
            "proc-macro-crate" = "2.0.2"
            "rustls-platform-verifier" = "0.6.2"
            "windows-registry" = "0.5.3"
            "quinn-proto" = "0.11.14"
            "cargo-platform" = "0.1.8"
            "hyper-rustls" = "0.27.7"
            "unicode-segmentation" = "1.12.0"
            "open" = "5.3.2"
          }
          $lockText = Get-Content "Cargo.lock" -Raw
          $pkgPattern = [regex]'(?ms)^\[\[package\]\]\r?\nname = "([^"]+)"\r?\nversion = "([^"]+)"'
          $anyFailed = $false
          foreach ($m in $pkgPattern.Matches($lockText)) {
            $pkgName = $m.Groups[1].Value
            $pkgVer = $m.Groups[2].Value
            if ($desired.ContainsKey($pkgName) -and $pkgVer -ne $desired[$pkgName]) {
              Write-Host "Понижаю $pkgName с $pkgVer до $($desired[$pkgName])"
              cargo update -p "${pkgName}:${pkgVer}" --precise $desired[$pkgName]
              if ($LASTEXITCODE -ne 0) {
                Write-Host "!!! НЕ ПОЛУЧИЛОСЬ понизить $pkgName до $($desired[$pkgName]) (код $LASTEXITCODE) — см. текст ошибки выше !!!"
                $anyFailed = $true
              }
            }
          }
          Write-Host "===== Проверка после понижения ====="
          $afterText = Get-Content "Cargo.lock" -Raw
          foreach ($m in $pkgPattern.Matches($afterText)) {
            $pkgName = $m.Groups[1].Value
            $pkgVer = $m.Groups[2].Value
            if ($desired.ContainsKey($pkgName)) {
              $mark = if ($pkgVer -eq $desired[$pkgName]) { "OK" } else { "!!! ВСЁ ЕЩЁ НЕ ТА ВЕРСИЯ !!!" }
              Write-Host "$pkgName = $pkgVer (нужно $($desired[$pkgName])) $mark"
            }
          }

      - name: Собрать инфокиоск (.exe/.msi/.nsis)
        run: tauri build
        working-directory: .

      - name: Переименовать установщик в безопасное имя
        # Имя программы содержит кириллицу ("Инфокиоск"), и NSIS
        # собирает файл вида "Инфокиоск_1.0.3_x64-setup.exe". При
        # публикации на GitHub такое имя иногда ломает прямую ссылку
        # на скачивание (кириллица в URL). Переименовываем в
        # предсказуемое имя из латиницы — ссылка на установщик всегда
        # будет одна и та же и всегда будет рабочей.
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Rename-Item -Path $installer.FullName -NewName "Infokiosk-Setup-x64.exe"

      - name: Собрать «Издателя» (kiosk_publish CLI)
        run: cargo build --release --manifest-path tools/kiosk-publisher-cli/Cargo.toml

      - name: Опубликовать артефакты сборки
        uses: actions/upload-artifact@v4
        with:
          name: infokiosk-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/infokiosk.exe
            tools/kiosk-publisher-cli/target/release/kiosk_publish.exe
          if-no-files-found: error

      - name: Опубликовать релиз со стабильной ссылкой на скачивание
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Инфокиоск — сборка №${{ github.run_number }}"
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            tools/kiosk-publisher-cli/target/release/kiosk_publish.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
